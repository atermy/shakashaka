<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<title>Daily ShakaShaka</title>
	<style>
		html,
		body {
			width: 100%;
			height: 100%;
			margin: 0;
			overflow: hidden;
			background: #000000;
		}

		body {
			touch-action: none;
		}

		#canvas {
			display: block;
			width: 100%;
			height: 100%;
			outline: none;
		}

		/* Godot 기본 진행률 표시줄 대신 스플래시 이미지만 표시 */
		#boot-splash {
			position: fixed;
			inset: 0;
			z-index: 10;
			display: grid;
			place-items: center;
			background: #000000;
		}

		#boot-splash.show-image--false #boot-splash-image {
			display: none;
		}

		#boot-splash-image {
			max-width: 100%;
			max-height: 100%;
			object-fit: contain;
		}

		#boot-splash.fullsize--true #boot-splash-image {
			width: 100%;
			height: 100%;
		}

		#boot-splash.use-filter--false #boot-splash-image {
			image-rendering: pixelated;
		}

		#boot-error {
			max-width: min(680px, 90vw);
			padding: 24px;
			box-sizing: border-box;
			font-family: sans-serif;
			line-height: 1.5;
			text-align: center;
			color: #ffffff;
		}
	</style>
	<link id="-gd-engine-icon" rel="icon" type="image/png" href="index.icon.png" />
<link rel="apple-touch-icon" href="index.apple-touch-icon.png"/>
<meta name="description"
	content="Play a new Shakashaka logic puzzle every day.">

<meta property="og:type"
	content="website">

<meta property="og:url"
	content="https://play.shakashaka.site/">

<meta property="og:title"
	content="Daily Shakashaka">

<meta property="og:description"
	content="Place triangles, complete rectangles, and solve a new logic puzzle every day.">

<meta property="og:image"
	content="https://play.shakashaka.site/social-preview.png?v=1">

<meta property="og:image:width"
	content="1200">

<meta property="og:image:height"
	content="630">

<meta property="og:image:alt"
	content="Daily Shakashaka puzzle game">


<meta name="twitter:card"
	content="summary_large_image">

<meta name="twitter:title"
	content="Daily Shakashaka">

<meta name="twitter:description"
	content="A new Shakashaka logic puzzle every day.">

<meta name="twitter:image"
	content="https://play.shakashaka.site/social-preview.png?v=1">
</head>
<body>
	<canvas id="canvas">
		이 브라우저는 HTML canvas를 지원하지 않습니다.
	</canvas>

	<div id="boot-splash" class="show-image--false fullsize--true use-filter--true" aria-hidden="true">
		<img id="boot-splash-image" src="index.png" alt="">
	</div>

	<script src="index.js"></script>
	<script>
		const canvas = document.getElementById("canvas");
		const bootSplash = document.getElementById("boot-splash");
		const engine = new Engine({"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":true,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":13912496,"index.wasm":39509339},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4});

		engine.startGame({
			canvas: canvas
		}).then(() => {
			bootSplash.remove();
		}).catch((error) => {
			console.error(error);
			bootSplash.setAttribute("aria-hidden", "false");
			bootSplash.innerHTML =
				'<div id="boot-error">게임을 불러오지 못했습니다.<br>브라우저 콘솔을 확인해 주세요.</div>';
		});
	</script>
</body>
</html>
